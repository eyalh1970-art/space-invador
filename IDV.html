<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDV – Israel Defense Venture</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* D-pad for sky level — same button size as style.css */
    #dpad {
      display: none;
      grid-template-columns: repeat(3, auto);
      grid-template-rows: repeat(3, auto);
      gap: 6px;
      align-items: center;
      justify-items: center;
    }
    #dpad button {
      /* inherit size from style.css #touchControls button */
    }
    #dpadCenter {
      width: 60px;
      height: 60px;
    }
    #btnUp    { grid-column: 2; grid-row: 1; }
    #btnLeft  { grid-column: 1; grid-row: 2; }
    #dpadCenter { grid-column: 2; grid-row: 2; }
    #btnRight { grid-column: 3; grid-row: 2; }
    #btnDown  { grid-column: 2; grid-row: 3; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="touchControls">
    <!-- Original layout: Level 1, 2, 3 -->
    <div id="moveButtons">
      <button id="btnLeftA">&#8592;</button>
      <button id="btnRightA">&#8594;</button>
    </div>
    <!-- D-pad layout: Sky level -->
    <div id="dpad">
      <button id="btnUp">&#8593;</button>
      <button id="btnLeft">&#8592;</button>
      <div id="dpadCenter"></div>
      <button id="btnRight">&#8594;</button>
      <button id="btnDown">&#8595;</button>
    </div>
    <button id="btnShoot">FIRE</button>
  </div>

  <button id="btnStart">TAP TO START</button>

  <script>
    window.IDV_CHAIN = true;

    const _p   = new URLSearchParams(window.location.search);
    const _lvl = _p.get('l') || '1';

    if (_lvl === 'sky') {
      // Sky level: show dpad, hide regular moveButtons
      document.getElementById('moveButtons').style.display = 'none';
      document.getElementById('dpad').style.display = 'grid';
    } else {
      // Other levels: alias btnLeftA/btnRightA as btnLeft/btnRight
      document.getElementById('btnLeftA').id  = 'btnLeft';
      document.getElementById('btnRightA').id = 'btnRight';
    }

    const _map = { '1': 'IDV1.js', 'sky': 'sky.js', '2': 'level2.js', '3': 'level3.js' };
    const _s   = document.createElement('script');
    _s.src     = (_map[_lvl] || 'IDV1.js') + '?idv=' + Date.now();
    document.body.appendChild(_s);
  </script>
</body>
</html>
