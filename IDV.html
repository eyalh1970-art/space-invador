<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDV – Israel Defense Venture</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Up/Down column — hidden by default, shown only for sky level */
    #udButtons {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="touchControls">
    <div id="moveButtons">
      <div id="udButtons">
        <button id="btnUp">&#8593;</button>
        <button id="btnDown">&#8595;</button>
      </div>
      <button id="btnLeft">&#8592;</button>
      <button id="btnRight">&#8594;</button>
    </div>
    <button id="btnShoot">FIRE</button>
  </div>

  <button id="btnStart">TAP TO START</button>

  <script>
    window.IDV_CHAIN = true;

    const _p   = new URLSearchParams(window.location.search);
    const _lvl = _p.get('l') || '1';

    // Show Up/Down only for sky level
    if (_lvl === 'sky') {
      document.getElementById('udButtons').style.display = 'flex';
    }

    const _map = { '1': 'IDV1.js', 'sky': 'sky.js', '2': 'level2.js', '3': 'level3.js' };
    const _s   = document.createElement('script');
    _s.src     = (_map[_lvl] || 'IDV1.js') + '?idv=' + Date.now();
    document.body.appendChild(_s);
  </script>
</body>
</html>
